name: "Release"

on:
  workflow_call:
    inputs:
      artifact-names:
        description: "Comma-separated artifact names to attach (e.g. android-build,macos-app)"
        type: string
        required: true
      draft:
        type: boolean
        default: false
      prerelease:
        type: boolean
        default: false
      generate-notes:
        description: "Auto-generate release notes from commits"
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets/

      - name: List artifacts
        run: find release-assets/ -type f | head -50

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARGS="--title ${TAG}"

          if [ "${{ inputs.draft }}" = "true" ]; then
            ARGS="${ARGS} --draft"
          fi

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            ARGS="${ARGS} --prerelease"
          fi

          if [ "${{ inputs.generate-notes }}" = "true" ]; then
            ARGS="${ARGS} --generate-notes"
          fi

          # Collect files from requested artifact directories
          FILES=""
          IFS=',' read -ra NAMES <<< "${{ inputs.artifact-names }}"
          for name in "${NAMES[@]}"; do
            name=$(echo "$name" | xargs)  # trim whitespace
            if [ -d "release-assets/${name}" ]; then
              for f in release-assets/${name}/*; do
                if [ -f "$f" ]; then
                  FILES="${FILES} ${f}"
                fi
              done
            fi
          done

          if [ -n "$FILES" ]; then
            gh release create "${TAG}" ${ARGS} ${FILES}
          else
            gh release create "${TAG}" ${ARGS}
          fi
