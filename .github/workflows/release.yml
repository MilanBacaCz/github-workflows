name: GitHub Release

on:
  workflow_call:
    inputs:
      artifact-names:
        description: "Comma-separated artifact names to download and attach"
        type: string
        required: true
      draft:
        description: "Create as draft release"
        type: boolean
        default: false
      prerelease:
        description: "Mark as pre-release"
        type: boolean
        default: false
      generate-notes:
        description: "Auto-generate release notes from commits"
        type: boolean
        default: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-assets

      - name: Flatten artifacts
        run: |
          mkdir -p flat-assets
          for name in $(echo "${{ inputs.artifact-names }}" | tr ',' ' '); do
            if [ -d "release-assets/$name" ]; then
              cp -r release-assets/$name/* flat-assets/ 2>/dev/null || true
            fi
          done
          echo "Assets to upload:"
          ls -la flat-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          ARGS="--title $TAG"

          if [ "${{ inputs.draft }}" = "true" ]; then
            ARGS="$ARGS --draft"
          fi

          if [ "${{ inputs.prerelease }}" = "true" ]; then
            ARGS="$ARGS --prerelease"
          fi

          if [ "${{ inputs.generate-notes }}" = "true" ]; then
            ARGS="$ARGS --generate-notes"
          fi

          # Attach all files from flat-assets
          FILES=$(find flat-assets -type f 2>/dev/null | tr '\n' ' ')

          gh release create "$TAG" $ARGS $FILES
