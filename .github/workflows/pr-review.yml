name: PR Review

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label (ubuntu-latest or self-hosted)"
        type: string
        default: "ubuntu-latest"
      working-directory:
        description: "Working directory"
        type: string
        default: "."
      coverage-package:
        description: "Package path for coverage"
        type: string
        default: "src"
      language:
        description: "Language for coverage (python, php, typescript, flutter)"
        type: string
        default: "python"
      python-version:
        description: "Python version (for python language)"
        type: string
        default: "3.11"
      node-version:
        description: "Node.js version (for typescript language)"
        type: string
        default: "20"
      labeler-config:
        description: "Path to labeler config file"
        type: string
        default: ".github/labeler.yml"
    secrets:
      env-vars:
        description: "Environment variables (KEY=VALUE per line)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  coverage-comment:
    name: Coverage comment
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      # --- Python ---
      - name: Setup Python
        if: ${{ inputs.language == 'python' }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Python dependencies
        if: ${{ inputs.language == 'python' }}
        run: pip install -e ".[dev]"

      - name: Set environment variables
        run: |
          echo "${{ secrets.env-vars }}" >> "$GITHUB_ENV"

      - name: Run Python tests with coverage
        if: ${{ inputs.language == 'python' }}
        run: |
          pytest tests/ \
            --cov=${{ inputs.coverage-package }} \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            -q

      # --- PHP ---
      - name: Setup PHP
        if: ${{ inputs.language == 'php' }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: xdebug
          tools: composer:v2

      - name: Install PHP dependencies
        if: ${{ inputs.language == 'php' }}
        run: composer install --prefer-dist --no-progress

      - name: Run PHP tests with coverage
        if: ${{ inputs.language == 'php' }}
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      # --- TypeScript ---
      - name: Setup Node.js
        if: ${{ inputs.language == 'typescript' }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}

      - name: Install TS dependencies
        if: ${{ inputs.language == 'typescript' }}
        run: npm ci

      - name: Run TS tests with coverage
        if: ${{ inputs.language == 'typescript' }}
        run: npx jest --coverage --coverageReporters=text --coverageReporters=clover

      # --- Ensure gh CLI available (self-hosted runners may lack it) ---
      - name: Install GitHub CLI
        if: always()
        run: |
          if command -v gh &>/dev/null; then exit 0; fi
          mkdir -p "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          ARCH=$(dpkg --print-architecture 2>/dev/null || echo "amd64")
          GH_VERSION=$(curl -s https://api.github.com/repos/cli/cli/releases/latest | python3 -c "import sys,json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))" 2>/dev/null || echo "2.74.0")
          curl -sL "https://github.com/cli/cli/releases/download/v${GH_VERSION}/gh_${GH_VERSION}_linux_${ARCH}.tar.gz" | tar xz
          mv "gh_${GH_VERSION}_linux_${ARCH}/bin/gh" "$HOME/.local/bin/gh"
          rm -rf "gh_${GH_VERSION}_linux_${ARCH}"
          "$HOME/.local/bin/gh" --version

      # --- Parse & comment ---
      - name: Parse coverage and comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          # Cobertura format
          if root.tag == 'coverage':
              rate = root.get('line-rate', '0')
              print(f'{float(rate)*100:.1f}')
          # Clover format
          elif root.find('.//metrics') is not None:
              m = root.find('.//project/metrics')
              stmts = int(m.get('statements','0'))
              covered = int(m.get('coveredstatements','0'))
              print(f'{covered/stmts*100:.1f}' if stmts else '0.0')
          " 2>/dev/null || echo "N/A")
          else
            COVERAGE="N/A"
          fi

          BODY="## 📊 Coverage Report

          | Metric | Value |
          |--------|-------|
          | **Line coverage** | ${COVERAGE}% |
          | **Language** | ${{ inputs.language }} |

          > Generated by [github-workflows](https://github.com/MilanBacaCz/github-workflows) CI"

          gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY" --edit-last 2>/dev/null \
            || gh pr comment "${{ github.event.pull_request.number }}" --body "$BODY"

  label-pr:
    name: Label PR
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v4
        with:
          configuration-path: ${{ inputs.labeler-config }}
