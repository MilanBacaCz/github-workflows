name: "PR Review"

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      working-directory:
        type: string
        default: "."
      install-command:
        type: string
        default: "pip install -e '.[dev]'"
      test-path:
        type: string
        default: "tests/"
      coverage-package:
        description: "Package path for --cov (e.g. src/myapp)"
        type: string
        default: ""
      labeler-config:
        type: string
        default: ".github/labeler.yml"
    secrets:
      env-vars:
        required: false

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage-comment:
    name: Coverage report
    if: inputs.coverage-package != ''
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: pip-${{ runner.os }}-

      - name: Set env vars
        if: secrets.env-vars != ''
        run: |
          echo "${{ secrets.env-vars }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Run tests with coverage
        run: |
          pytest ${{ inputs.test-path }} \
            --cov=${{ inputs.coverage-package }} \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing

      - name: Post coverage comment
        env:
          GH_TOKEN: ${{ github.token }}
        working-directory: ${{ github.workspace }}
        run: |
          COVERAGE=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('${{ inputs.working-directory }}/coverage.xml')
          rate = float(tree.getroot().attrib['line-rate'])
          print(f'{rate * 100:.1f}')
          ")

          BODY="## Coverage Report

          | Metric | Value |
          |--------|-------|
          | **Line coverage** | ${COVERAGE}% |

          > Generated by [centralized CI](https://github.com/MilanBacaCz/github-workflows)"

          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY" --edit-last 2>/dev/null || \
          gh pr comment ${{ github.event.pull_request.number }} --body "$BODY"

  label-pr:
    name: Label PR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/labeler@v5
        with:
          repo-token: ${{ github.token }}
          configuration-path: ${{ inputs.labeler-config }}
