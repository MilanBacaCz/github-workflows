name: Flutter CI

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label (ubuntu-latest or self-hosted)"
        type: string
        default: "ubuntu-latest"
      flutter-version:
        description: "Flutter version or channel"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing pubspec.yaml"
        type: string
        default: "."
      run-analyze:
        description: "Run flutter analyze"
        type: boolean
        default: true
      run-tests:
        description: "Run flutter test"
        type: boolean
        default: true
      coverage-threshold:
        description: "Minimum coverage percentage (0 = no threshold)"
        type: number
        default: 0
      coverage-artifact-name:
        description: "Name for the coverage artifact (must be unique per workflow run)"
        type: string
        default: "coverage-report"
      upload-coverage:
        description: "Upload coverage as artifact"
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze:
    name: Analyze
    if: ${{ inputs.run-analyze }}
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      # On GitHub-hosted runners, install Flutter via action.
      # On self-hosted runners, Flutter is pre-installed in PATH.
      - uses: subosito/flutter-action@v2
        if: ${{ inputs.runner != 'self-hosted' }}
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --fatal-infos

      - name: Format check
        run: dart format --set-exit-if-changed .

  test:
    name: Tests
    if: ${{ inputs.run-tests }}
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        if: ${{ inputs.runner != 'self-hosted' }}
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests with coverage
        run: flutter test --coverage

      - name: Check coverage threshold
        if: ${{ inputs.coverage-threshold > 0 }}
        run: |
          sudo apt-get install -y lcov
          total=$(lcov --summary coverage/lcov.info 2>&1 | grep 'lines' | sed 's/.*: //' | sed 's/%.*//')
          echo "Coverage: ${total}%"
          if (( $(echo "$total < ${{ inputs.coverage-threshold }}" | bc -l) )); then
            echo "::error::Coverage ${total}% is below threshold ${{ inputs.coverage-threshold }}%"
            exit 1
          fi

      - name: Upload coverage artifact
        if: ${{ always() && inputs.upload-coverage }}
        uses: actions/upload-artifact@v5
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: ${{ inputs.working-directory }}/coverage/lcov.info
          retention-days: 7
