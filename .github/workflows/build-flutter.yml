name: Flutter Build

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label for Linux jobs (ubuntu-latest or self-hosted)"
        type: string
        default: "ubuntu-latest"
      working-directory:
        description: "Directory containing pubspec.yaml"
        type: string
        default: "."
      flutter-version:
        description: "Flutter version or channel"
        type: string
        default: "stable"
      build-android:
        description: "Build Android"
        type: boolean
        default: true
      build-ios:
        description: "Build iOS"
        type: boolean
        default: false
      build-type:
        description: "Build type (release, profile, debug)"
        type: string
        default: "release"
      android-format:
        description: "Android output format (apk, appbundle)"
        type: string
        default: "apk"
      java-version:
        description: "Java version for Android build"
        type: string
        default: "17"
      upload-artifacts:
        description: "Upload build artifacts (APK/AAB/IPA)"
        type: boolean
        default: false
    secrets:
      keystore-base64:
        description: "Android keystore file (base64 encoded)"
        required: false
      keystore-password:
        description: "Android keystore password"
        required: false
      key-alias:
        description: "Android key alias"
        required: false
      key-password:
        description: "Android key password"
        required: false
      ios-certificate-base64:
        description: "iOS signing certificate (base64)"
        required: false
      ios-provisioning-profile-base64:
        description: "iOS provisioning profile (base64)"
        required: false
      ios-keychain-password:
        description: "Temporary keychain password"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    name: Android (${{ inputs.android-format }})
    if: ${{ inputs.build-android }}
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}

      # Install Flutter only on GitHub-hosted runners. Self-hosted runners
      # (including custom tier labels like 'heavy' / 'light') have Flutter
      # pre-installed in the runner image — necessary because Google does not
      # publish ARM64 stable binaries for flutter-action to download.
      - uses: subosito/flutter-action@v2
        if: ${{ startsWith(inputs.runner, 'ubuntu-') || startsWith(inputs.runner, 'macos-') || startsWith(inputs.runner, 'windows-') }}
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true

      - name: Verify Flutter
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.keystore-base64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
          fi

      - name: Create key.properties
        env:
          KEYSTORE_BASE64: ${{ secrets.keystore-base64 }}
          STORE_PASSWORD: ${{ secrets.keystore-password }}
          KEY_PASSWORD: ${{ secrets.key-password }}
          KEY_ALIAS: ${{ secrets.key-alias }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            cat > android/key.properties << EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore.jks
          EOF
          fi

      - name: Build APK
        if: ${{ inputs.android-format == 'apk' }}
        run: flutter build apk --${{ inputs.build-type }}

      - name: Build App Bundle
        if: ${{ inputs.android-format == 'appbundle' }}
        run: flutter build appbundle --${{ inputs.build-type }}

      - name: Upload APK
        if: ${{ inputs.android-format == 'apk' && inputs.upload-artifacts }}
        uses: actions/upload-artifact@v5
        with:
          name: android-build
          path: ${{ inputs.working-directory }}/build/app/outputs/flutter-apk/*.apk
          retention-days: 14

      - name: Upload AAB
        if: ${{ inputs.android-format == 'appbundle' && inputs.upload-artifacts }}
        uses: actions/upload-artifact@v5
        with:
          name: android-build
          path: ${{ inputs.working-directory }}/build/app/outputs/bundle/*/*.aab
          retention-days: 14

  build-ios:
    name: iOS (IPA)
    if: ${{ inputs.build-ios }}
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter-version }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import certificate and provisioning profile
        env:
          CERTIFICATE_BASE64: ${{ secrets.ios-certificate-base64 }}
          PROFILE_BASE64: ${{ secrets.ios-provisioning-profile-base64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.ios-keychain-password }}
        run: |
          if [ -z "$CERTIFICATE_BASE64" ]; then
            echo "No iOS certificate provided, skipping signing setup"
            exit 0
          fi
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$PROFILE_BASE64" | base64 --decode -o "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build IPA
        run: flutter build ipa --${{ inputs.build-type }} --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v5
        with:
          name: ios-build
          path: ${{ inputs.working-directory }}/build/ios/ipa/*.ipa
          retention-days: 14

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
