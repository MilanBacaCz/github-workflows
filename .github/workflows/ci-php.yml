name: PHP CI

on:
  workflow_call:
    inputs:
      php-version:
        description: "PHP version"
        type: string
        default: "8.4"
      php-extensions:
        description: "Comma-separated PHP extensions"
        type: string
        default: "pdo_mysql, mbstring, intl, gd, zip, bcmath"
      working-directory:
        description: "Directory containing composer.json"
        type: string
        default: "."
      source-directory:
        description: "Source directory for analysis (relative to working-directory)"
        type: string
        default: "www/app"
      run-phpstan:
        description: "Run PHPStan static analysis"
        type: boolean
        default: true
      phpstan-memory-limit:
        description: "PHPStan memory limit"
        type: string
        default: "512M"
      run-phpunit:
        description: "Run PHPUnit tests"
        type: boolean
        default: true
      run-syntax-check:
        description: "Run PHP syntax check"
        type: boolean
        default: true

jobs:
  lint:
    name: Lint & Syntax
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles(format('{0}/composer.lock', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHP syntax check
        if: ${{ inputs.run-syntax-check }}
        run: find ${{ inputs.source-directory }} -name "*.php" -print0 | xargs -0 -n1 php -l

  phpstan:
    name: Static analysis (PHPStan)
    if: ${{ inputs.run-phpstan }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles(format('{0}/composer.lock', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=${{ inputs.phpstan-memory-limit }}

  test:
    name: Tests (PHPUnit)
    if: ${{ inputs.run-phpunit }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2
          coverage: xdebug

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles(format('{0}/composer.lock', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPUnit
        run: vendor/bin/phpunit --coverage-clover=coverage.xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage.xml
          retention-days: 7
