name: "Build: Python Desktop"

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      python-version:
        type: string
        default: "3.13"
      app-name:
        description: "Application name for output files"
        type: string
        required: true
      spec-file:
        description: "PyInstaller .spec file path (relative to working-directory). Empty = auto."
        type: string
        default: ""
      build-script:
        description: "Custom build script path (overrides PyInstaller). Empty = use PyInstaller."
        type: string
        default: ""
      build-macos:
        type: boolean
        default: true
      build-windows:
        type: boolean
        default: false
      install-command:
        type: string
        default: "pip install -r requirements.txt"

jobs:
  build-macos:
    name: Build macOS
    if: inputs.build-macos
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          ${{ inputs.install-command }}
          pip install pyinstaller

      - name: Build with custom script
        if: inputs.build-script != ''
        run: bash ${{ inputs.build-script }}

      - name: Build with PyInstaller
        if: inputs.build-script == ''
        run: |
          if [ -n "${{ inputs.spec-file }}" ]; then
            pyinstaller "${{ inputs.spec-file }}"
          else
            pyinstaller --onedir --windowed --name "${{ inputs.app-name }}" main.py
          fi

      - name: Package .app
        run: |
          cd dist
          APP_DIR=$(find . -name "*.app" -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            tar -czf "${{ inputs.app-name }}.app.tar.gz" "$APP_DIR"
          else
            tar -czf "${{ inputs.app-name }}.tar.gz" "${{ inputs.app-name }}"
          fi

      - name: Create PKG installer
        run: |
          APP_DIR=$(find dist -name "*.app" -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            pkgbuild \
              --root "$APP_DIR" \
              --identifier "com.app.${{ inputs.app-name }}" \
              --version "1.0" \
              --install-location "/Applications/${{ inputs.app-name }}.app" \
              "dist/${{ inputs.app-name }}.pkg"
          fi

      - name: Create DMG
        run: |
          APP_DIR=$(find dist -name "*.app" -type d | head -1)
          if [ -n "$APP_DIR" ]; then
            hdiutil create \
              -volname "${{ inputs.app-name }}" \
              -srcfolder "$APP_DIR" \
              -ov -format UDZO \
              "dist/${{ inputs.app-name }}.dmg" || echo "DMG creation skipped"
          fi

      - name: Upload .app archive
        uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: ${{ inputs.working-directory }}/dist/*.tar.gz
          retention-days: 14

      - name: Upload PKG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ inputs.working-directory }}/dist/*.pkg
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload DMG
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: ${{ inputs.working-directory }}/dist/*.dmg
          retention-days: 14
          if-no-files-found: ignore

  build-windows:
    name: Build Windows
    if: inputs.build-windows
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          ${{ inputs.install-command }}
          pip install pyinstaller

      - name: Build with custom script
        if: inputs.build-script != ''
        shell: bash
        run: bash ${{ inputs.build-script }}

      - name: Build with PyInstaller
        if: inputs.build-script == ''
        run: |
          if ("${{ inputs.spec-file }}" -ne "") {
            pyinstaller "${{ inputs.spec-file }}"
          } else {
            pyinstaller --onedir --windowed --name "${{ inputs.app-name }}" main.py
          }

      - name: Package as ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ inputs.app-name }}/*" -DestinationPath "dist/${{ inputs.app-name }}.zip"

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: ${{ inputs.working-directory }}/dist/${{ inputs.app-name }}.zip
          retention-days: 14
