name: Python Desktop Build

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Project root directory"
        type: string
        default: "."
      python-version:
        description: "Python version"
        type: string
        default: "3.13"
      app-name:
        description: "Application name (used for output files)"
        type: string
        required: true
      spec-file:
        description: "PyInstaller .spec file path (empty = use app-name.spec)"
        type: string
        default: ""
      build-script:
        description: "Custom build script to run instead of PyInstaller (e.g. scripts/build.sh)"
        type: string
        default: ""
      build-macos:
        description: "Build for macOS"
        type: boolean
        default: true
      build-windows:
        description: "Build for Windows"
        type: boolean
        default: false
      install-command:
        description: "Dependency install command"
        type: string
        default: "pip install -r requirements.txt"
      macos-runner:
        description: "macOS runner (macos-latest for ARM, macos-13 for Intel)"
        type: string
        default: "macos-latest"
      artifact-suffix:
        description: "Suffix for artifact names (e.g. -arm64, -x86_64)"
        type: string
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    name: macOS (.app, .pkg, .dmg)
    if: ${{ inputs.build-macos }}
    runs-on: ${{ inputs.macos-runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      # GitHub-hosted macOS: use setup-python action (needs sudo for framework install)
      - uses: actions/setup-python@v5
        if: ${{ inputs.macos-runner == 'macos-latest' || inputs.macos-runner == 'macos-13' }}
        with:
          python-version: ${{ inputs.python-version }}

      # Self-hosted macOS: use Homebrew-installed Python (no sudo needed)
      - name: Set up Homebrew Python (self-hosted)
        if: ${{ inputs.macos-runner != 'macos-latest' && inputs.macos-runner != 'macos-13' }}
        shell: /bin/bash -l {0}
        run: |
          PYTHON_BIN=$(command -v python${{ inputs.python-version }} || true)
          if [ -z "$PYTHON_BIN" ]; then
            # Fallback: check Homebrew prefix directly
            for PREFIX in /opt/homebrew /usr/local; do
              CAND="$PREFIX/opt/python@${{ inputs.python-version }}/bin/python${{ inputs.python-version }}"
              if [ -x "$CAND" ]; then
                PYTHON_BIN="$CAND"
                break
              fi
            done
          fi
          if [ -z "$PYTHON_BIN" ]; then
            echo "::error::Python ${{ inputs.python-version }} not found on runner. Install with: brew install python@${{ inputs.python-version }}"
            exit 1
          fi
          echo "Using Python: $PYTHON_BIN"
          "$PYTHON_BIN" --version
          echo "$(dirname "$PYTHON_BIN")" >> "$GITHUB_PATH"

      - name: Create venv (self-hosted macOS)
        if: ${{ inputs.macos-runner != 'macos-latest' && inputs.macos-runner != 'macos-13' }}
        run: |
          python${{ inputs.python-version }} -m venv .venv-build
          echo "$PWD/.venv-build/bin" >> "$GITHUB_PATH"
          .venv-build/bin/python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          ${{ inputs.install-command }}
          pip install pyinstaller

      - name: Build with custom script
        if: ${{ inputs.build-script != '' }}
        run: bash ${{ inputs.build-script }}

      - name: Build with PyInstaller
        if: ${{ inputs.build-script == '' }}
        run: |
          SPEC="${{ inputs.spec-file }}"
          if [ -z "$SPEC" ]; then
            SPEC="${{ inputs.app-name }}.spec"
          fi
          pyinstaller "$SPEC"

      - name: Package .app as tar.gz
        run: |
          cd dist
          APP_DIR=$(find . -name "*.app" -maxdepth 2 | head -1)
          if [ -n "$APP_DIR" ]; then
            tar -czf "${{ inputs.app-name }}-macos.app.tar.gz" "$APP_DIR"
          else
            echo "::warning::No .app bundle found in dist/"
          fi

      - name: Create PKG installer
        run: |
          APP_DIR=$(find dist -name "*.app" -maxdepth 2 | head -1)
          if [ -n "$APP_DIR" ]; then
            pkgbuild \
              --root "$(dirname "$APP_DIR")" \
              --identifier "com.app.${{ inputs.app-name }}" \
              --install-location /Applications \
              "dist/${{ inputs.app-name }}-macos.pkg"
          fi

      - name: Create DMG installer
        run: |
          APP_DIR=$(find dist -name "*.app" -maxdepth 2 | head -1)
          if [ -n "$APP_DIR" ]; then
            hdiutil create \
              -volname "${{ inputs.app-name }}" \
              -srcfolder "$(dirname "$APP_DIR")" \
              -ov -format UDZO \
              "dist/${{ inputs.app-name }}-macos.dmg"
          fi

      - name: Upload macOS app
        uses: actions/upload-artifact@v5
        with:
          name: macos-app${{ inputs.artifact-suffix }}
          path: ${{ inputs.working-directory }}/dist/*.app.tar.gz
          retention-days: 14

      - name: Upload macOS PKG
        uses: actions/upload-artifact@v5
        with:
          name: macos-pkg${{ inputs.artifact-suffix }}
          path: ${{ inputs.working-directory }}/dist/*.pkg
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload macOS DMG
        uses: actions/upload-artifact@v5
        with:
          name: macos-dmg${{ inputs.artifact-suffix }}
          path: ${{ inputs.working-directory }}/dist/*.dmg
          retention-days: 14
          if-no-files-found: ignore

  build-windows:
    name: Windows (.exe)
    if: ${{ inputs.build-windows }}
    runs-on: windows-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          ${{ inputs.install-command }}
          pip install pyinstaller

      - name: Build with custom script
        if: ${{ inputs.build-script != '' }}
        shell: bash
        run: bash ${{ inputs.build-script }}

      - name: Build with PyInstaller
        if: ${{ inputs.build-script == '' }}
        shell: bash
        run: |
          SPEC="${{ inputs.spec-file }}"
          if [ -z "$SPEC" ]; then
            SPEC="${{ inputs.app-name }}.spec"
          fi
          pyinstaller "$SPEC"

      - name: Package as zip
        shell: pwsh
        run: |
          $distDir = "dist/${{ inputs.app-name }}"
          if (Test-Path $distDir) {
            Compress-Archive -Path "$distDir/*" -DestinationPath "dist/${{ inputs.app-name }}-windows.zip"
          } else {
            Write-Warning "No dist directory found"
          }

      - name: Upload Windows build
        uses: actions/upload-artifact@v5
        with:
          name: windows-build
          path: ${{ inputs.working-directory }}/dist/*.zip
          retention-days: 14
