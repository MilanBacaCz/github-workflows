name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      working-directory:
        description: "Directory containing pyproject.toml"
        type: string
        default: "."
      coverage-package:
        description: "Package path for coverage (e.g. src/myapp)"
        type: string
        default: "src"
      coverage-threshold:
        description: "Minimum coverage percentage"
        type: number
        default: 80
      run-mypy:
        description: "Run mypy type checking"
        type: boolean
        default: true
      run-security:
        description: "Run pip-audit + bandit security checks"
        type: boolean
        default: true
      mypy-paths:
        description: "Paths for mypy (default: src/ only)"
        type: string
        default: "src/"
      security-ignore-vulns:
        description: "Comma-separated CVE IDs to ignore in pip-audit (e.g. CVE-2026-4539)"
        type: string
        default: ""
    secrets:
      env-vars:
        description: "Environment variables (KEY=VALUE per line)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  typecheck:
    name: Type check (mypy)
    if: ${{ inputs.run-mypy }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Mypy
        run: mypy ${{ inputs.mypy-paths }}

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Set environment variables
        run: |
          echo "${{ secrets.env-vars }}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=${{ inputs.coverage-package }} \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-threshold }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage.xml
          retention-days: 7

  security:
    name: Security audit
    if: ${{ inputs.run-security }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit
        run: |
          ARGS=""
          if [ -n "${{ inputs.security-ignore-vulns }}" ]; then
            for vuln in $(echo "${{ inputs.security-ignore-vulns }}" | tr ',' ' '); do
              ARGS="$ARGS --ignore-vuln $vuln"
            done
          fi
          pip-audit $ARGS

      - name: Bandit
        run: bandit -r src/ --skip B101 -x tests/
