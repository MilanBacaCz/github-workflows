name: Python CI

on:
  workflow_call:
    inputs:
      runner:
        description: "Runner label (ubuntu-latest or self-hosted)"
        type: string
        default: "ubuntu-latest"
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      working-directory:
        description: "Directory containing pyproject.toml"
        type: string
        default: "."
      coverage-package:
        description: "Package path for coverage (e.g. src/myapp)"
        type: string
        default: "src"
      coverage-threshold:
        description: "Minimum coverage percentage"
        type: number
        default: 80
      run-mypy:
        description: "Run mypy type checking"
        type: boolean
        default: true
      run-security:
        description: "Run pip-audit + bandit security checks"
        type: boolean
        default: true
      mypy-paths:
        description: "Paths for mypy (default: src/ only)"
        type: string
        default: "src/"
      lint-paths:
        description: "Paths for ruff check/format (space-separated)"
        type: string
        default: "src/ tests/"
      security-scan-paths:
        description: "Paths for bandit scan (space-separated)"
        type: string
        default: "src/"
      security-ignore-vulns:
        description: "Comma-separated CVE IDs to ignore in pip-audit (e.g. CVE-2026-4539)"
        type: string
        default: ""
      system-packages:
        description: "Space-separated apt packages to install before pip (e.g. libegl1 libgl1)"
        type: string
        default: ""
      pre-install:
        description: "Pip packages to install BEFORE main deps (e.g. 'PyQt6==6.7.1' for ARM64 binary wheel)"
        type: string
        default: ""
      extra-env:
        description: "Extra env vars to set in all jobs (KEY=VALUE per line)"
        type: string
        default: ""
      bandit-skips:
        description: "Comma-separated bandit rules to skip (e.g. B101,B608)"
        type: string
        default: "B101"
    secrets:
      env-vars:
        description: "Environment variables (KEY=VALUE per line)"
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Clean workspace
        run: |
          if [ -d "${{ github.workspace }}/.git" ]; then
            cd "${{ github.workspace }}"
            git clean -ffdx 2>/dev/null || true
          fi

      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Set extra environment variables
        if: ${{ inputs.extra-env != '' }}
        run: echo "${{ inputs.extra-env }}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        run: /usr/bin/sudo apt-get update && /usr/bin/sudo apt-get install -y ${{ inputs.system-packages }}

      - name: Pre-install packages
        if: ${{ inputs.pre-install != '' }}
        run: pip install ${{ inputs.pre-install }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check ${{ inputs.lint-paths }}

      - name: Ruff format check
        run: ruff format --check ${{ inputs.lint-paths }}

  typecheck:
    name: Type check (mypy)
    if: ${{ inputs.run-mypy }}
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Clean workspace
        run: |
          if [ -d "${{ github.workspace }}/.git" ]; then
            cd "${{ github.workspace }}"
            git clean -ffdx 2>/dev/null || true
          fi

      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Set extra environment variables
        if: ${{ inputs.extra-env != '' }}
        run: echo "${{ inputs.extra-env }}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        run: /usr/bin/sudo apt-get update && /usr/bin/sudo apt-get install -y ${{ inputs.system-packages }}

      - name: Pre-install packages
        if: ${{ inputs.pre-install != '' }}
        run: pip install ${{ inputs.pre-install }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Mypy
        run: mypy ${{ inputs.mypy-paths }}

  test:
    name: Tests (pytest)
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Clean workspace
        run: |
          if [ -d "${{ github.workspace }}/.git" ]; then
            cd "${{ github.workspace }}"
            git clean -ffdx 2>/dev/null || true
          fi

      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Set extra environment variables
        if: ${{ inputs.extra-env != '' }}
        run: echo "${{ inputs.extra-env }}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Set environment variables
        run: |
          echo "${{ secrets.env-vars }}" >> "$GITHUB_ENV"

      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        run: /usr/bin/sudo apt-get update && /usr/bin/sudo apt-get install -y ${{ inputs.system-packages }}

      - name: Pre-install packages
        if: ${{ inputs.pre-install != '' }}
        run: pip install ${{ inputs.pre-install }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: |
          pytest tests/ \
            --cov=${{ inputs.coverage-package }} \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ inputs.coverage-threshold }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage.xml
          retention-days: 7

  security:
    name: Security audit
    if: ${{ inputs.run-security }}
    runs-on: ${{ inputs.runner }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Clean workspace
        run: |
          if [ -d "${{ github.workspace }}/.git" ]; then
            cd "${{ github.workspace }}"
            git clean -ffdx 2>/dev/null || true
          fi

      - uses: actions/checkout@v4
        with:
          clean: true

      - name: Set extra environment variables
        if: ${{ inputs.extra-env != '' }}
        run: echo "${{ inputs.extra-env }}" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install system packages
        if: ${{ inputs.system-packages != '' }}
        run: /usr/bin/sudo apt-get update && /usr/bin/sudo apt-get install -y ${{ inputs.system-packages }}

      - name: Pre-install packages
        if: ${{ inputs.pre-install != '' }}
        run: pip install ${{ inputs.pre-install }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install security tools
        run: pip install pip-audit bandit

      - name: pip-audit
        run: |
          ARGS=""
          if [ -n "${{ inputs.security-ignore-vulns }}" ]; then
            for vuln in $(echo "${{ inputs.security-ignore-vulns }}" | tr ',' ' '); do
              ARGS="$ARGS --ignore-vuln $vuln"
            done
          fi
          pip-audit $ARGS

      - name: Bandit
        run: bandit -r ${{ inputs.security-scan-paths }} --skip ${{ inputs.bandit-skips }} -x tests/
