name: TypeScript CI

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node.js version"
        type: string
        default: "20"
      working-directory:
        description: "Directory containing package.json"
        type: string
        default: "."
      package-manager:
        description: "Package manager (npm, yarn, pnpm)"
        type: string
        default: "npm"
      run-lint:
        description: "Run ESLint"
        type: boolean
        default: true
      run-typecheck:
        description: "Run tsc type checking"
        type: boolean
        default: true
      run-tests:
        description: "Run tests"
        type: boolean
        default: true
      test-command:
        description: "Test command override (default: npx jest --coverage)"
        type: string
        default: ""
      coverage-threshold:
        description: "Minimum coverage percentage (0 = no threshold)"
        type: number
        default: 0

jobs:
  lint:
    name: Lint (ESLint)
    if: ${{ inputs.run-lint }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: ESLint
        run: npx eslint . --max-warnings=0

  typecheck:
    name: Type check (tsc)
    if: ${{ inputs.run-typecheck }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: TypeScript compile check
        run: npx tsc --noEmit

  test:
    name: Tests
    if: ${{ inputs.run-tests }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            npm install -g pnpm && pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Run tests
        run: |
          if [ -n "${{ inputs.test-command }}" ]; then
            ${{ inputs.test-command }}
          else
            npx jest --coverage --coverageReporters=text --coverageReporters=clover
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ inputs.working-directory }}/coverage/clover.xml
          retention-days: 7
