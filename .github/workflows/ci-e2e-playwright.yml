name: "CI: E2E (Playwright)"

on:
  workflow_call:
    inputs:
      python-version:
        type: string
        default: "3.11"
      working-directory:
        type: string
        default: "."
      install-command:
        type: string
        default: "pip install -e '.[dev]'"
      start-command:
        description: "Command to start the application (e.g. uvicorn myapp.main:app)"
        type: string
        required: true
      health-url:
        type: string
        default: "http://localhost:8000/health"
      test-path:
        type: string
        default: "tests/e2e/"
      browser:
        type: string
        default: "chromium"
    secrets:
      env-vars:
        required: false

jobs:
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles(format('{0}/pyproject.toml', inputs.working-directory)) }}
          restore-keys: pip-${{ runner.os }}-

      - name: Set env vars
        if: secrets.env-vars != ''
        run: |
          echo "${{ secrets.env-vars }}" >> $GITHUB_ENV

      - name: Install dependencies
        run: ${{ inputs.install-command }}

      - name: Install Playwright
        run: |
          pip install pytest-playwright
          playwright install --with-deps ${{ inputs.browser }}

      - name: Start application
        run: |
          ${{ inputs.start-command }} &
          sleep 3
          curl --retry 10 --retry-delay 2 --retry-connrefused ${{ inputs.health-url }}

      - name: Run E2E tests
        run: pytest ${{ inputs.test-path }} --browser ${{ inputs.browser }}

      - name: Upload traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: ${{ inputs.working-directory }}/test-results/
