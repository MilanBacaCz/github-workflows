name: Deploy to TestFlight

on:
  workflow_call:
    inputs:
      artifact-name:
        description: "Artifact name containing IPA"
        type: string
        default: "ios-build"
    secrets:
      app-store-connect-api-key-id:
        description: "App Store Connect API Key ID"
        required: true
      app-store-connect-issuer-id:
        description: "App Store Connect Issuer ID"
        required: true
      app-store-connect-api-key-base64:
        description: "App Store Connect API Key (base64 encoded .p8)"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Upload to TestFlight
    runs-on: macos-latest
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: build-output

      - name: Find IPA file
        id: find-ipa
        run: |
          IPA=$(find build-output -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No IPA file found in artifact"
            exit 1
          fi
          echo "ipa-path=$IPA" >> "$GITHUB_OUTPUT"
          echo "Found IPA: $IPA"

      - name: Decode API key
        run: |
          mkdir -p ~/private_keys
          echo -n "${{ secrets.app-store-connect-api-key-base64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.app-store-connect-api-key-id }}.p8

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.find-ipa.outputs.ipa-path }}" \
            --apiKey "${{ secrets.app-store-connect-api-key-id }}" \
            --apiIssuer "${{ secrets.app-store-connect-issuer-id }}"

      - name: Cleanup API key
        if: always()
        run: rm -rf ~/private_keys
