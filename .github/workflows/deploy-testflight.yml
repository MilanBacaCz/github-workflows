name: "Deploy: TestFlight"

on:
  workflow_call:
    inputs:
      artifact-name:
        type: string
        default: "ios-build"
    secrets:
      app-store-connect-api-key-id:
        description: "App Store Connect API Key ID"
        required: true
      app-store-connect-issuer-id:
        description: "App Store Connect Issuer ID"
        required: true
      app-store-connect-api-key-base64:
        description: "App Store Connect API Key (.p8 file, base64 encoded)"
        required: true

jobs:
  deploy:
    name: Deploy to TestFlight
    runs-on: macos-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: build/

      - name: Setup API key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.app-store-connect-api-key-base64 }}" | base64 --decode > ~/private_keys/AuthKey_${{ secrets.app-store-connect-api-key-id }}.p8

      - name: Find IPA file
        id: find-file
        run: |
          FILE=$(find build/ -name "*.ipa" | head -1)
          echo "file=${FILE}" >> $GITHUB_OUTPUT
          echo "Found: ${FILE}"

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "${{ steps.find-file.outputs.file }}" \
            --apiKey "${{ secrets.app-store-connect-api-key-id }}" \
            --apiIssuer "${{ secrets.app-store-connect-issuer-id }}"

      - name: Cleanup
        if: always()
        run: rm -rf ~/private_keys
